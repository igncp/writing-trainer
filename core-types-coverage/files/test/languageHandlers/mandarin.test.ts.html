      },
      {
        pronunciation: &#x27;hao&#x27;,

        word: &#x27;很&#x27;,
      },
      {
        pronunciation: &#x27;hao&#x27;,
        word: &#x27;好&#x27;,
      },
    ]

    const fullDictionary = {
      你: &#x27;ni&#x27;,
      嗎: &#x27;ma&#x27;,
      好: &#x27;hao&#x27;,
      很: &#x27;hen&#x27;,
      我: &#x27;wo&#x27;,
    }

    expect(
      mandarinHandler.convertToCharsObjs({
        charsToRemove: [],
        langOpts: {
          dictionary: {
            ...fullDictionary,
            很: undefined,
          },
        },
        text: &#x27;你好嗎?我很好&#x27;,
      }),
    ).toEqual(
      correctResult.map(c =&gt;
        c.word === &#x27;很&#x27; ? { ...c, pronunciation: &#x27;?&#x27; } : c,
      ),
    )

    expect(
      mandarinHandler.convertToCharsObjs({
        charsToRemove: [],
        langOpts: {},
        text: &#x27;你好嗎?我很好&#x27;,
      }),
    ).toEqual(
      correctResult.map(c =&gt;
        c.pronunciation ? { ...c, pronunciation: &#x27;?&#x27; } : c,
      ),
    )

    expect(
      mandarinHandler.convertToCharsObjs({
        charsToRemove: [],
        text: &#x27;你好嗎?我很好&#x27;,
      }),
    ).toEqual(
      correctResult.map(c =&gt;
        c.pronunciation ? { ...c, pronunciation: &#x27;?&#x27; } : c,
      ),
    )

    expect(
      mandarinHandler.convertToCharsObjs({
        charsToRemove: [],
        langOpts: {

      })),
    )
  })
})
