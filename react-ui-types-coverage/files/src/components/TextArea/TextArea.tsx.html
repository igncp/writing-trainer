const TextArea = ({

      onChange={onChange}
      ref={ref}
      spellCheck={false}
      style={{
        border: &#x27;1px solid var(--color-background)&#x27;,
        outline: 0,
        resize: &#x27;none&#x27;,
        width: &#x27;100%&#x27;,
