    <div style="margin-top:3em" class="ui container"><h1 class="ui header"><a href="../../../../../index.html">TypeScript coverage report</a></h1><table style="margin-top:2em" class="ui celled table"><thead class=""><tr class=""><th class="">Filename</th><th class="">Percent</th><th class="">Threshold</th><th class="">Total</th><th class="">Covered</th><th class="">Uncovered</th></tr></thead><tbody class=""><tr class="positive"><td class="">src/containers/RecordsSection/screens/RecordSave.tsx</td><td class="">100.00%</td><td class="">95%</td><td class="">134</td><td class="">134</td><td class="">0</td></tr></tbody></table><textarea id="editor" readonly="" style="margin-top:3em">import React, { useEffect, useRef, useState } from &#x27;react&#x27;

import Button from &#x27;../../../components/Button/Button&#x27;
import TextInput from &#x27;../../../components/TextInput/TextInput&#x27;
import { T_Services } from &#x27;../../../typings/mainTypes&#x27;

export interface RecordToSave {
  link: string
  name: string
}

type RecordSaveProps = {
  initialRecord: RecordToSave | null
  onRecordSave: (r: RecordToSave) =&gt; void
  onShowRecordsList: () =&gt; void
  services: T_Services
}

const RecordSave = ({
  initialRecord,
  onRecordSave,
  onShowRecordsList,
  services,
}: RecordSaveProps) =&gt; {
  const [recordName, setRecordName] = useState&lt;string&gt;(
    initialRecord ? initialRecord.name : &#x27;&#x27;,
  )
  const [recordLink, setRecordLink] = useState&lt;string&gt;(
    initialRecord ? initialRecord.link : &#x27;&#x27;,
  )
  const [currentUrl, setCurrentUrl] = useState&lt;string&gt;(&#x27;&#x27;)
  const linkInputRef = useRef&lt;HTMLInputElement&gt;(null)

  useEffect(() =&gt; {
    services
      .getCurrentUrl()
      .then(newCurrentUrl =&gt; {
        setCurrentUrl(newCurrentUrl)
        setRecordLink(newCurrentUrl)
      })
      .catch((e: Error) =&gt; {
        console.log(e)
      })
  }, [])

  if (!currentUrl) {
    return null
  }

  const isSaveButtonDisabled = !recordName

  const handleRecordSave = () =&gt; {
    if (!isSaveButtonDisabled) {
      onRecordSave({
        link: recordLink.trim(),
        name: recordName,
      })
    }
  }

  return (
    &lt;React.Fragment&gt;
      &lt;div&gt;
        &lt;Button onClick={onShowRecordsList}&gt;List&lt;/Button&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;div style={{ padding: 10 }}&gt;
          Name:{&#x27; &#x27;}
          &lt;span style={{ marginLeft: 10 }}&gt;
            &lt;TextInput
              autoFocus
              onChange={e =&gt; {
                setRecordName(e.target.value)
              }}
              onEnterPress={() =&gt; {
                if (recordName) {
                  linkInputRef.current?.focus()
                }
              }}
              value={recordName}
            /&gt;
          &lt;/span&gt;
        &lt;/div&gt;
        &lt;div style={{ padding: 10 }}&gt;
          Link:{&#x27; &#x27;}
          &lt;span style={{ marginLeft: 10 }}&gt;
            &lt;TextInput
              inputRef={linkInputRef}
              onChange={e =&gt; {
                setRecordLink(e.target.value)
              }}
              onEnterPress={handleRecordSave}
              value={recordLink}
            /&gt;
          &lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div&gt;
        &lt;Button disabled={isSaveButtonDisabled} onClick={handleRecordSave}&gt;
          Save
        &lt;/Button&gt;
      &lt;/div&gt;
    &lt;/React.Fragment&gt;
  )
}

export default RecordSave
