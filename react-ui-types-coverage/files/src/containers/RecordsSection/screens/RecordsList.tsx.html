    <body>
    <div style="margin-top:3em" class="ui container"><h1 class="ui header"><a href="../../../../../index.html">TypeScript coverage report</a></h1><table style="margin-top:2em" class="ui celled table"><thead class=""><tr class=""><th class="">Filename</th><th class="">Percent</th><th class="">Threshold</th><th class="">Total</th><th class="">Covered</th><th class="">Uncovered</th></tr></thead><tbody class=""><tr class="positive"><td class="">src/containers/RecordsSection/screens/RecordsList.tsx</td><td class="">100.00%</td><td class="">95%</td><td class="">227</td><td class="">227</td><td class="">0</td></tr></tbody></table><textarea id="editor" readonly="" style="margin-top:3em">import React, { useState } from &#x27;react&#x27;
import { Record } from &#x27;writing-trainer-core&#x27;

import Button from &#x27;../../../components/Button/Button&#x27;
import TextInput from &#x27;../../../components/TextInput/TextInput&#x27;

type CellProps = {
  bold?: boolean
  label?: string
  title?: string
  value: string
}

const Cell = ({ bold, label, title, value }: CellProps) =&gt; {
  return (
    &lt;div
      style={{
        display: &#x27;inline-block&#x27;,
        marginRight: 30,
        ...(bold ? { fontWeight: 700 } : {}),
      }}
      {...(title ? { title } : {})}
    &gt;
      {label &amp;&amp; (
        &lt;React.Fragment&gt;
          &lt;b&gt;{label}&lt;/b&gt;:{&#x27; &#x27;}
        &lt;/React.Fragment&gt;
      )}
      {value}
    &lt;/div&gt;
  )
}

const formatRecordDate = (d: number): string =&gt; {
  const date = new Date(d)

  const dateStr = date.toLocaleDateString(&#x27;en-US&#x27;, {
    hour: &#x27;2-digit&#x27;,
    hour12: false,
    minute: &#x27;2-digit&#x27;,
  })

  return `[${dateStr}]`
}

type Song = {
  artist: string
  lang: string
  load: () =&gt; Promise&lt;{ lyrics: string[] }&gt;
  name: string
  video: string
}

type RecordsListProps = {
  onRecordEdit: (r: Record) =&gt; void
  onRecordLoad: (r: Record) =&gt; void
  onRecordRemove: (r: Record) =&gt; void
  onSongLoad: (s: string[]) =&gt; void
  records: Record[]
  songs: Song[]
}

const RecordsList = ({
  onRecordEdit,
  onRecordLoad,
  onRecordRemove,
  onSongLoad,
  records,
  songs,
}: RecordsListProps) =&gt; {
  const [filterValue, setFilterValue] = useState&lt;string&gt;(&#x27;&#x27;)
  const filteredRecords = Record.filterByText({
    filterText: filterValue,
    records,
  })

  return (
    &lt;div&gt;
      {records.length &gt; 0 &amp;&amp; (
        &lt;div style={{ padding: 10, position: &#x27;relative&#x27; }}&gt;
          &lt;TextInput
            autoFocus
            onChange={e =&gt; {
              setFilterValue(e.target.value)
            }}
            onEnterPress={() =&gt; {
              if (filteredRecords.length &gt; 0) {
                onRecordLoad(filteredRecords[0])
              }
            }}
            placeholder=&quot;Filter by name and language&quot;
            style={{ width: &#x27;100%&#x27; }}
          /&gt;
        &lt;/div&gt;
      )}
      &lt;div style={{ maxHeight: 300, overflow: &#x27;auto&#x27; }}&gt;
        {filteredRecords.map(record =&gt; {
          const { createdOn, id, lastLoadedOn, name } = record

          return (
            &lt;div key={id} style={{ padding: 10 }}&gt;
              &lt;Cell label=&quot;Name&quot; value={name} /&gt;
              &lt;Cell title=&quot;Created&quot; value={formatRecordDate(createdOn)} /&gt;
              &lt;Cell title=&quot;Loaded&quot; value={formatRecordDate(lastLoadedOn)} /&gt;
              &lt;Cell bold title=&quot;Language&quot; value={record.language} /&gt;
              {record.link &amp;&amp; (
                &lt;a
                  href={record.link}
                  style={{ marginRight: 15 }}
                  target=&quot;_blank&quot;
                  title={record.link}
                &gt;
                  Website
                &lt;/a&gt;
              )}
              &lt;Button
                onClick={() =&gt; {
                  onRecordLoad(record)
                }}
              &gt;
                Load
              &lt;/Button&gt;
              &lt;Button
                onClick={() =&gt; {
                  onRecordEdit(record)
                }}
              &gt;
                Edit
              &lt;/Button&gt;
              &lt;Button
                onClick={() =&gt; {
                  onRecordRemove(record)
                }}
              &gt;
                Remove
              &lt;/Button&gt;
            &lt;/div&gt;
          )
        })}
        {songs.map(song =&gt; {
          const { artist, lang, load, name, video } = song

          return (
            &lt;div key={name + artist} style={{ padding: 10 }}&gt;
              &lt;Cell label=&quot;Name&quot; value={name} /&gt;
              &lt;Cell title=&quot;Artist&quot; value={artist} /&gt;
              &lt;Cell bold title=&quot;Language&quot; value={lang} /&gt;
              {video &amp;&amp; (
                &lt;a
                  href={video}
                  style={{ marginRight: 15 }}
                  target=&quot;_blank&quot;
                  title={video}
                &gt;
                  Video
                &lt;/a&gt;
              )}
              &lt;Button
                onClick={() =&gt; {
                  load().then(({ lyrics }) =&gt; {
                    onSongLoad(lyrics)
                  })
                }}
              &gt;
                Load
              &lt;/Button&gt;
            &lt;/div&gt;
          )
        })}
      &lt;/div&gt;
    &lt;/div&gt;
  )
}

export default RecordsList
